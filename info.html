<p>Nos termos e condições aqui mencionados, sempre que forem utilizados os termos "nós" ou "nosso", referimo-nos à lonclinic.pt. Sempre que utilizarmos "você" ou "seu", referimo-nos a qualquer pessoa que utiliza a lonclinic.com</p>
<h2>A. Geral</h2>

<p>Reservamo-nos ao direito de realizar alterações aos Termos e Condições de tempos a tempos sem providenciar anteriormente qualquer notificação. Os Termos e Condições alterados têm efeito a partir da data em que são publicados neste website. Assim, deve conferi-los sempre que visitar este website sendo que, o acesso continuado e utilização do website devem representar a sua aceitação dos Termos e Condições alterados.</p>
<p>A Lon Clinic reserva-se o direito de utilizar os dados pessoais que introduziu neste website para o contactar diretamente e enviar comunicação pertinente dentro do âmbito dos serviços prestados, em conformidade com a nossa Política de Privacidade.</p>
<h2>B. Os nossos serviços</h2>
<p>Oferecemos um serviço online de videoconsultas médicas e de outras áreas da saúde de forma a que possa ter acesso a profissionais de saúde através de videoconferência. Nas consultas é feita a avaliação personalizada da sua história clínica e dos seus dados de saúde, e incluído aconselhamento médico, prescrição medicamentosa e/ou aconselhamento de consulta presencial ou mesmo a recorrer a um serviço de urgência.</p>
<p>Fornecemos informação no nosso website, nas nossas redes sociais e através da nossa newsletter, e damos apoio personalizado através das nossas consultas com marcação prévia.</p>
<p>O serviço de Consultas Online tem como objetivo tornar os cuidados de saúde mais acessíveis, mais confortáveis e mais próximos do paciente.</p>
<p>Todos os profissionais de saúde a colaborar com a Lon Clinic apresentam as qualificações necessárias para trabalhar em Portugal e estão registados nas respetivas Ordens Profissionais e Entidades Reguladoras.</p>
<p>NOTA: A Lon Clinic é, por definição, uma consulta de aconselhamento e que não deve ser usada em casos de emergência médica, situações que o(a) coloquem em risco de vida e em situações médicas que exijam exame físico e contacto presencial com o profissional de saúde, correndo o risco de atrasar a assistência médica necessária. Este serviço não substitui os normais cuidados de saúde prestados pelas Unidades de Saúde Familiar ou pelos Hospitais e não pretende responder a situações de emergência médica ou psicológica.</p>
<p>Em situações de emergência, deve idealmente consultar um profissional de saúde presencialmente, recorrer ao serviço de urgência hospitalar mais próximo ou ligar ao número nacional de emergências (112).</p>
<p>É importante que esteja ciente de que a informação contida neste website sobre os vários temas, como dicas médicas, é fornecida com o único intuito de o ajudar. No entanto, por não ser informação personalizada, é somente da sua responsabilidade verificar a adequabilidade da informação ao seu caso concreto assim como a decisão de aplicar ou não as dicas fornecidas. Por isso, não nos responsabilizamos por qualquer consequência que advenha da aplicação da informação fornecida.</p>
<h2>C. ACESSO</h2>
<p>O serviço de consultas online funciona de acordo com um agendamento prévio e pressupõe o pagamento do valor integral da consulta para a sua realização. Se durante o agendamento prévio sentir dificuldades técnicas na marcação das mesmas, entre em contacto connosco através do nosso chat ou do nosso e-mail info@lonclinic.com e auxiliaremos em tudo o que nos for possível.</p>
<p>O serviço de consultas online da Lon Clinic destina-se exclusivamente a maiores de 18 anos, com exceção das consultas de Medicina do Viajante, para as quais é obrigatória a presença e consentimento do representante legal durante toda a consulta.</p>
<p>O utilizador é responsável pela veracidade, exatidão e autenticidade dos dados fornecidos.</p>
<p>O utilizador que marque consulta para outrem é responsável por garantir que os dados fornecidos estão atualizados e são verdadeiros e que a pessoa que usufruirá da consulta online, concorda com o agendamento da mesma e com os Termos e Condições e Política de Privacidade.</p>
<p>Após recebimento da quantia e emissão da respetiva fatura, será enviada uma notificação ao utilizador a confirmar o agendamento da consulta pretendida.</p>
<p>Conservamo-nos o direito de suspender, limitar ou terminar o seu acesso ao presente website em qualquer momento assim como alterar a forma de acesso e até o formato das consultas, ou outros produtos ou serviços que tenha adquirido, disponibilizando-os através de outras plataformas ou mesmo em forma de ficheiro, para garantir o acesso pelo tempo acordado à data de compra.</p>
<p>De igual forma, reservamo-nos o direito de apresentar, apagar, editar, retirar ou modificar quaisquer dados, conteúdos, materiais ou informações exibidas em https://lonclinic.com ou em qualquer produto associado à LON Clinic a qualquer momento. O mesmo se aplica às redes sociais.</p>
<p>Atenção, ainda, ao seguinte:</p>
<p>O utilizador é responsável por garantir as condições necessárias para a realização da consulta como acesso à internet, bateria, um computador ou dispositivo móvel com câmara e microfone, atualizações de software e um local com a privacidade necessária. A LON Clinic não se responsabiliza caso essas condições não sejam garantidas pelo utilizador, não havendo, via de regra, lugar a reembolso ou remarcação da consulta caso a consulta não se realize ou não se conclua.</p>
<p>O profissional de saúde dará início à consulta na data e hora agendada, podendo ter a sala de consulta aberta até 5 minutos antes. O paciente deve aceder à sala e pedir para entrar à hora agendada. É dada uma tolerância de 15 minutos. Em caso de atraso sem aviso prévio e após o período de tolerância é dada por terminada a consulta sem lugar a reembolso, por isso, é muito importante que seja pontual.</p>
<h2>D. VIDEOCONSULTAS ONLINE</h2>
<p>As consultas online consistem em consultas feitas por videochamada na plataforma DOXY. Esta plataforma foi avaliada pelo nosso Encarregado de Proteção de Dados (EPD/DPO), do ponto de vista do cumprimento do Regulamento Geral de Proteção de Dados (RGPD) e do direito à privacidade das partes envolvidas, como sendo adequada.</p>
<p>A única coisa que o utilizador precisa é de ativar um link que será enviado assim que esteja definida a data e hora. Em alternativa, a consulta também pode ser realizada por telefone caso o paciente assim venha a solicitar, salvo para emissão de atestados médicos.</p>
<p>A identidade do paciente é confirmada pelo profissional de saúde no início de todas as consultas.</p>
<p>As consultas serão realizadas em língua portuguesa, inglesa, ou espanhola, consoante a preferência do utilizador.</p>
<p>Durante a consulta serão fornecidas todas as informações relevantes na área da saúde relativamente à sua situação clínica, assim como esclarecimentos relativamente à possível medicação prescrita. As receitas serão imediatamente enviadas para o seu email ou por SMS.</p>
<p>É muito importante que explique todo o seu historial clínico e não omita nenhum dado, sob pena de atrasar ou alterar o diagnóstico.</p>
<p>A decisão clínica do profissional de saúde baseia-se nas informações prestadas pelo paciente, pelo que a veracidade e exatidão das mesmas são condição essencial para uma prestação de cuidados adequada. A LON Clinic não se responsabiliza por situações que decorram de informações falsas, imprecisas ou desatualizadas por parte do paciente.</p>
<p>NOTA: O acompanhamento é individual (salvo exceções como consulta de psicologia em grupo ou quando houver um pedido do paciente autorizado pelo profissional de saúde ou, ainda, quando sugerido pelo profissional de saúde com a devida autorização do paciente.</p>
<p>Sem prejuízo, o profissional de saúde poderá recusar a continuidade da consulta caso o paciente não cumpra com as regras estabelecidas, se tentar obter medicação para venda ou uso inadequado, insulte ou ameace o profissional de saúde, não tenha as condições mínimas necessárias à realização da consulta, não providencie um ambiente calmo, silencioso e de alto grau de confidencialidade, ou por outros motivos que deixem o profissional de saúde desconfortável. Caso o paciente não tenha uma boa ligação de internet e a consulta online não seja viável, o profissional reserva-se ao direito de terminar a consulta e reagendar ou terminar a consulta por chamada telefónica.</p>
<p>Depois de cada Serviço terá a oportunidade de deixar comentários ao outro profissional com quem realizou a consulta online. O seu comentário deve ser breve e não pode conter linguagem discriminatória, ofensiva ou difamatória. Os comentários não são verificados pela DrOnline quanto à precisão e poderão ser incorretos ou enganosos.</p>
<h2>E. Pagamento e respetivos meios</h2>
<p>O pagamento da consulta deve ser efetuado com uma antecedência igual ou superior a 48 horas à sua realização, o que garante o agendamento da consulta..</p>

                }
            };

            const page = new URLSearchParams(window.location.search).get("page") || "";
            const noIndexPages = new Set([
                "termos-condicoes",
                "politica-privacidade",
                "cookies",
                "politica-nao-discriminacao",
                "livro-reclamacoes",
                "reclamacoes"
            ]);
            const data = content[page] || {
                section: "INFORMAÇÃO",
                title: "Página não encontrada",
                subtitle: "Este conteúdo não existe",
                body: "Volte ao início e escolha uma opção válida do rodapé."
            };

            const isKnownPage = Boolean(content[page]);
            const pageTitle = data.title + " | Lon Clinic";
            const canonicalBase = window.location.origin + window.location.pathname;
            const canonicalUrl = isKnownPage && page ? (canonicalBase + "?page=" + encodeURIComponent(page)) : canonicalBase;
            const bodyText = String(data.body || "").trim();
            const bodyHtmlText = String(data.bodyHtml || "").replace(/<[^>]*>/g, " ").replace(/\s+/g, " ").trim();
            const fallbackDescription = "Informações institucionais, apoio, legal e serviços da Lon Clinic.";
            const metaDescription = (data.subtitle || bodyText || bodyHtmlText || fallbackDescription).slice(0, 160);

            document.title = pageTitle;
            document.querySelector('meta[name="description"]').setAttribute("content", metaDescription);
            document.getElementById("metaRobots").setAttribute(
                "content",
                (!isKnownPage || noIndexPages.has(page)) ? "noindex,follow" : "index,follow,max-image-preview:large"
            );
            document.getElementById("canonicalUrl").setAttribute("href", canonicalUrl);
            document.getElementById("ogTitle").setAttribute("content", pageTitle);
            document.getElementById("ogDescription").setAttribute("content", metaDescription);
            document.getElementById("ogUrl").setAttribute("content", canonicalUrl);
            document.getElementById("twitterTitle").setAttribute("content", pageTitle);
            document.getElementById("twitterDescription").setAttribute("content", metaDescription);
            document.getElementById("structuredData").textContent = JSON.stringify({
                "@context": "https://schema.org",
                "@type": "MedicalWebPage",
                name: pageTitle,
                description: metaDescription,
                url: canonicalUrl,
                inLanguage: "pt-PT",
                isPartOf: {
                    "@type": "WebSite",
                    name: "Lon Clinic",
                    url: window.location.origin
                }
            });

            document.getElementById("pill").textContent = data.section;
            document.getElementById("title").textContent = data.title;
            document.getElementById("subtitle").textContent = data.subtitle;
            const bodyEl = document.getElementById("body");
            if (data.bodyHtml) {
                bodyEl.innerHTML = data.bodyHtml;
            } else {
                bodyEl.textContent = data.body;
            }

            const actions = document.getElementById("actions");
            (data.actions || [{ label: "Ir para início", href: "/" }]).forEach(function (action) {
                const a = document.createElement("a");
                a.className = "btn" + (action.primary ? " btn-primary" : "");
                a.href = action.href;
                a.textContent = action.label;
                if (action.href.indexOf("http") === 0) {
                    a.target = "_blank";
                    a.rel = "noopener noreferrer";
                }
                actions.appendChild(a);
            });

            if (page === "reclamacoes") {
                const form = document.getElementById("complaintsForm");
                const statusEl = document.getElementById("complaintsStatus");

                if (form) {
                    form.addEventListener("submit", async function (event) {
                        event.preventDefault();
                        const button = form.querySelector('button[type="submit"]');
                        const formData = new FormData(form);
                        const payload = {
                            name: String(formData.get("name") || "").trim(),
                            citizenCard: String(formData.get("citizenCard") || "").trim(),
                            phone: String(formData.get("phone") || "").trim(),
                            email: String(formData.get("email") || "").trim(),
                            message: String(formData.get("message") || "").trim()
                        };

                        if (statusEl) {
                            statusEl.textContent = "";
                            statusEl.classList.remove("is-success", "is-error");
                        }

                        if (button) {
                            button.disabled = true;
                            button.textContent = "A enviar...";
                        }

                        try {
                            const response = await fetch("/api/reclamacoes", {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify(payload)
                            });

                            const result = await response.json();
                            if (!response.ok) {
                                throw new Error(result.error || "Não foi possível enviar a reclamação.");
                            }

                            form.reset();
                            if (statusEl) {
                                statusEl.textContent = "Reclamação enviada com sucesso. Responderemos em até 5 dias úteis.";
                                statusEl.classList.add("is-success");
                            }
                        } catch (err) {
                            if (statusEl) {
                                statusEl.textContent = (err && err.message) || "Erro ao enviar reclamação.";
                                statusEl.classList.add("is-error");
                            }
                        } finally {
                            if (button) {
                                button.disabled = false;
                                button.textContent = "Enviar reclamação";
                            }
                        }
                    });
                }
            }
        })();
    </script>
</body>
</html>
